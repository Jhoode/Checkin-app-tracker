let projects = [];
let documents = [];
let connectionOk = true;
const root = document.getElementById('tracker-root');
const CACHE_KEY = 'checkin-app-tracker-cache';
const DOCS_CACHE_KEY = 'checkin-app-tracker-docs-cache';
const NAME_KEY = 'checkin-app-tracker-username';
const DOCS_TABLE = 'tracker_documents';
const DOCS_BUCKET = 'tracker-files';
const DOC_TYPES = ['PDF', 'Doc', 'Sheet', 'Slides', 'Repo', 'Link'];
const DOC_TYPE_ICON = { PDF: '📄', Doc: '📝', Sheet: '📊', Slides: '📽️', Repo: '💻', Link: '🔗' };

function guessDocType(filename) {
  const ext = (filename.split('.').pop() || '').toLowerCase();
  if (ext === 'pdf') return 'PDF';
  if (['doc', 'docx'].includes(ext)) return 'Doc';
  if (['xls', 'xlsx', 'csv'].includes(ext)) return 'Sheet';
  if (['ppt', 'pptx'].includes(ext)) return 'Slides';
  return 'Link';
}

const DOCS_SEED = [
  { id: 'd' + Math.random().toString(36).slice(2, 10), title: 'Kickoff Documentation', url: 'RCCG-VictoryHouse-CheckIn-Kickoff.pdf', doc_type: 'PDF', added_by: 'Jude' },
];

function getUserName() {
  return localStorage.getItem(NAME_KEY);
}

function promptForName(existing) {
  const name = window.prompt('Your name (shown on your comments):', existing || '');
  if (name && name.trim()) {
    localStorage.setItem(NAME_KEY, name.trim());
  }
  render();
}

function normalize(rows) {
  return rows.map(p => ({
    ...p,
    comments: Array.isArray(p.comments) ? p.comments : [],
    status: STATUSES.includes(p.status) ? p.status : 'pending',
    progress: Number.isFinite(Number(p.progress)) ? Number(p.progress) : 0,
    description: p.description || '',
    stage: STAGES.includes(p.stage) ? p.stage : STAGES[0]
  }));
}

async function loadDocuments() {
  try {
    const { data, error } = await supabase
      .from(DOCS_TABLE)
      .select('*')
      .order('created_at', { ascending: true });

    if (error) throw error;

    if (!data || data.length === 0) {
      const { error: insertError } = await supabase.from(DOCS_TABLE).insert(DOCS_SEED);
      if (insertError) throw insertError;
      documents = DOCS_SEED;
    } else {
      documents = data;
    }
    localStorage.setItem(DOCS_CACHE_KEY, JSON.stringify(documents));
  } catch (e) {
    console.error('Documents load failed, falling back to cache:', e);
    try {
      const cached = localStorage.getItem(DOCS_CACHE_KEY);
      documents = cached ? JSON.parse(cached) : DOCS_SEED;
    } catch {
      documents = DOCS_SEED;
    }
  }
}

async function insertDocument(doc) {
  const { error } = await supabase.from(DOCS_TABLE).insert(doc);
  if (error) {
    alert("Couldn't save the document — check your connection and try again.");
    console.error(error);
    return false;
  }
  return true;
}

async function deleteDocument(id, storagePath) {
  if (storagePath) {
    // Best-effort — if this fails, still proceed to remove the DB row
    // rather than leaving a broken entry the team can't get rid of.
    const { error: storageError } = await supabase.storage.from(DOCS_BUCKET).remove([storagePath]);
    if (storageError) console.error('Storage cleanup failed:', storageError);
  }
  const { error } = await supabase.from(DOCS_TABLE).delete().eq('id', id);
  if (error) {
    alert("Couldn't remove the document — check your connection and try again.");
    console.error(error);
    return false;
  }
  return true;
}

function subscribeToDocumentChanges() {
  supabase
    .channel('tracker-documents-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: DOCS_TABLE }, async () => {
      await loadDocuments();
      render();
    })
    .subscribe();
}

async function load() {

  try {
    const { data, error } = await supabase
      .from(TABLE)
      .select('*')
      .order('created_at', { ascending: true });

    if (error) throw error;

    if (!data || data.length === 0) {
      // Table's empty — first time anyone's loaded this board. Seed it.
      const { error: insertError } = await supabase.from(TABLE).insert(SEED);
      if (insertError) throw insertError;
      projects = normalize(SEED);
    } else {
      projects = normalize(data);
    }

    connectionOk = true;
    localStorage.setItem(CACHE_KEY, JSON.stringify(projects));
  } catch (e) {
    console.error('Supabase load failed, falling back to cache:', e);
    connectionOk = false;
    try {
      const cached = localStorage.getItem(CACHE_KEY);
      projects = cached ? normalize(JSON.parse(cached)) : normalize(SEED);
    } catch {
      projects = normalize(SEED);
    }
  }

  await loadDocuments();
  render();
}

function subscribeToChanges() {
  supabase
    .channel('tracker-tasks-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, () => {
      // Simplest correct approach: any change from anyone, just refetch.
      load();
    })
    .subscribe();
}

async function insertTask(task) {
  const { error } = await supabase.from(TABLE).insert(task);
  if (error) {
    alert("Couldn't save — check your connection and try again.");
    console.error(error);
    return false;
  }
  return true;
}

async function updateTask(id, patch) {
  const { error } = await supabase.from(TABLE).update(patch).eq('id', id);
  if (error) {
    alert("Couldn't save — check your connection and try again.");
    console.error(error);
    return false;
  }
  return true;
}

async function deleteTask(id) {
  const { error } = await supabase.from(TABLE).delete().eq('id', id);
  if (error) {
    alert("Couldn't delete — check your connection and try again.");
    console.error(error);
    return false;
  }
  return true;
}

function render() {
  const userName = getUserName() || 'Anonymous';
  root.innerHTML = `
    <div class="topbar">
      <div>
        <h1>⚡ Check-In App Tracker</h1>
        <div class="connected ${connectionOk ? '' : 'offline'}">
          <span class="dot"></span>${connectionOk ? 'Connected' : 'Offline — showing last saved copy'}
        </div>
      </div>
      <div class="top-actions">
        <button class="btn btn-outline" id="whoami-btn">Commenting as: ${escapeHtml(userName)}</button>
        <button class="btn btn-outline" id="export-btn">⬇ Export</button>
        <button class="btn btn-outline" id="reset-btn">Reset</button>
        <button class="btn btn-orange" id="new-btn">+ New Task</button>
      </div>
    </div>
    <hr class="divider">
    ${!connectionOk ? '<div class="error-banner">Couldn\'t reach the shared board — showing your last saved copy. Changes won\'t save until connection is back.</div>' : ''}

    <div class="docs-section">
      <div class="docs-heading"><span class="label">📁 DOCUMENTS</span></div>
      <div class="docs-list" id="docs-list"></div>
    </div>

    <div class="backlog-label">📋 PRODUCT BACKLOG WITH THE STEPS</div>
    <div class="pipeline" id="pipeline"></div>
    <div id="stage-list"></div>
    <div class="shared-note">Live and shared — everyone viewing this page sees the same board in real time.</div>
  `;

  root.querySelector('#whoami-btn').addEventListener('click', () => promptForName(userName));

  const docsList = root.querySelector('#docs-list');
  documents.forEach(doc => {
    const chip = document.createElement('div');
    chip.className = 'doc-chip';
    chip.innerHTML = `
      <span class="doc-type">${DOC_TYPE_ICON[doc.doc_type] || '🔗'} ${escapeHtml(doc.doc_type)}</span>
      <a href="${escapeHtml(doc.url)}" target="_blank" rel="noopener">${escapeHtml(doc.title)}</a>
      <button class="doc-del" data-id="${doc.id}" title="Remove">✕</button>
    `;
    chip.querySelector('.doc-del').addEventListener('click', async () => {
      if (!confirm(`Remove "${doc.title}" from the documents list?`)) return;
      if (await deleteDocument(doc.id, doc.storage_path)) {
        await loadDocuments();
        render();
      }
    });
    docsList.appendChild(chip);
  });
  const addChip = document.createElement('button');
  addChip.className = 'doc-add-chip';
  addChip.textContent = '+ Add document';
  addChip.addEventListener('click', () => openDocModal());
  docsList.appendChild(addChip);
  if (documents.length === 0) {
    docsList.insertAdjacentHTML('afterbegin', '<span class="docs-empty">No documents added yet.</span>');
  }

  const pipelineEl = root.querySelector('#pipeline');
  STAGES.forEach((stage, i) => {
    const stageItems = projects.filter(p => p.stage === stage);
    const count = stageItems.length;
    const isComplete = count > 0 && stageItems.every(p => p.status === 'complete');
    const stageEl = document.createElement('div');
    stageEl.className = 'pipe-stage' + (isComplete ? ' complete' : '');
    stageEl.innerHTML = `<div class="stage-name">${escapeHtml(stage)}</div><div class="stage-count">${count} task${count === 1 ? '' : 's'}</div>`;
    pipelineEl.appendChild(stageEl);
    if (i < STAGES.length - 1) {
      const arrow = document.createElement('div');
      arrow.className = 'pipe-arrow';
      arrow.textContent = '---->';
      pipelineEl.appendChild(arrow);
    }
  });

  const stageList = root.querySelector('#stage-list');
  STAGES.forEach((stage, i) => {
    const items = projects.filter(p => p.stage === stage);
    const section = document.createElement('div');
    section.className = 'stage-section';
    section.innerHTML = `
      <div class="stage-header">
        <span class="idx">${i + 1}.</span>
        <span class="name">${escapeHtml(stage)}</span>
        <span class="count">(${items.length})</span>
      </div>
      <div class="stage-cards"></div>
    `;
    const cardsEl = section.querySelector('.stage-cards');
    if (items.length === 0) {
      cardsEl.innerHTML = '<div class="empty-stage">Nothing here yet</div>';
    } else {
      items.forEach(p => cardsEl.appendChild(renderProject(p)));
    }
    stageList.appendChild(section);
  });

  root.querySelector('#new-btn').addEventListener('click', () => openEditModal(null));
  root.querySelector('#reset-btn').addEventListener('click', async () => {
    if (!confirm('Reset every task to Pending / 0% and clear all comments? Titles and stages stay as they are.')) return;
    for (const p of projects) {
      await updateTask(p.id, { status: 'pending', progress: 0, comments: [] });
    }
    load();
  });
  root.querySelector('#export-btn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(projects, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'checkin-app-tracker.json';
    a.click();
    URL.revokeObjectURL(url);
  });
}

function nextStatus(status) {
  const idx = STATUSES.indexOf(status);
  return STATUSES[(idx + 1) % STATUSES.length];
}

function renderProject(p) {
  const el = document.createElement('div');
  el.className = 'project';
  el.innerHTML = `
    <div class="project-main">
      <div class="project-head">
        <div>
          <div class="project-title">${escapeHtml(p.title)}</div>
          <div class="project-cat">${escapeHtml(p.stage)}</div>
        </div>
        <div class="project-actions">
          <button class="status-pill ${p.status}" data-act="cycle">${STATUS_LABEL[p.status]}</button>
          <button class="icon-btn" data-act="edit" title="Edit">✎</button>
          <button class="icon-btn danger" data-act="delete" title="Delete">✕</button>
        </div>
      </div>
      <div class="project-desc">${escapeHtml(p.description)}</div>
      <div class="progress-row">
        <div class="progress-track"><div class="progress-fill ${p.status}" style="width:${p.progress}%"></div></div>
        <div class="progress-pct">${p.progress}%</div>
      </div>
      <div class="step-actions">
        <button class="sbtn start" data-act="start">▶ Start</button>
        <button class="sbtn stop" data-act="stop">■ Stop</button>
        <button class="sbtn block" data-act="block">⛔ Block</button>
      </div>
      <div class="quick-actions">
        <button class="qbtn done" data-act="done">✓ Done</button>
      </div>
    </div>
    <div class="project-comments">
      <div class="comments-heading">💬 Comments (${(p.comments || []).length})</div>
      <div class="comments-list">
        ${(p.comments || []).map(c => `
          <div class="comment">
            <div class="meta">${escapeHtml(c.author)} · ${escapeHtml(c.time)}</div>
            <div class="body">${escapeHtml(c.text)}</div>
          </div>`).join('') || '<div class="no-comments">No comments yet</div>'}
      </div>
      <div class="comment-add">
        <input type="text" placeholder="Add comment…" data-role="comment-input">
        <button data-act="post-comment">Post</button>
      </div>
    </div>
  `;

  el.querySelector('[data-act="cycle"]').addEventListener('click', async () => {
    const newStatus = nextStatus(p.status);
    const patch = { status: newStatus };
    if (newStatus === 'complete') patch.progress = 100;
    if (newStatus === 'pending') patch.progress = 0;
    if (await updateTask(p.id, patch)) load();
  });
  el.querySelector('[data-act="edit"]').addEventListener('click', () => openEditModal(p));
  el.querySelector('[data-act="delete"]').addEventListener('click', async () => {
    if (!confirm('Delete this task?')) return;
    if (await deleteTask(p.id)) load();
  });
  el.querySelector('[data-act="done"]').addEventListener('click', async () => {
    if (await updateTask(p.id, { progress: 100, status: 'complete' })) load();
  });
  el.querySelector('[data-act="start"]').addEventListener('click', async () => {
    const patch = { status: 'in_progress' };
    if (p.progress === 0) patch.progress = 5;
    if (await updateTask(p.id, patch)) load();
  });
  el.querySelector('[data-act="stop"]').addEventListener('click', async () => {
    if (await updateTask(p.id, { status: 'pending' })) load();
  });
  el.querySelector('[data-act="block"]').addEventListener('click', async () => {
    if (await updateTask(p.id, { status: 'blocked' })) load();
  });
  el.querySelector('[data-act="post-comment"]').addEventListener('click', async () => {
    const input = el.querySelector('[data-role="comment-input"]');
    const text = input.value.trim();
    if (!text) return;
    const author = getUserName() || 'Anonymous';
    const newComments = [...(p.comments || []), { author, time: nowStr(), text }];
    if (await updateTask(p.id, { comments: newComments })) load();
  });

  return el;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function openDocModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>Add document</h3>
      <div class="field">
        <label>Upload a file</label>
        <input id="d-file" type="file">
      </div>
      <div class="field">
        <label>— or paste a link instead —</label>
        <input id="d-url" type="text" placeholder="https://…">
      </div>
      <div class="field">
        <label>Title</label>
        <input id="d-title" type="text" placeholder="e.g. Technical Specification">
      </div>
      <div class="field">
        <label>Type</label>
        <select id="d-type">
          ${DOC_TYPES.map(t => `<option value="${t}">${DOC_TYPE_ICON[t]} ${t}</option>`).join('')}
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="d-cancel">Cancel</button>
        <button class="btn btn-orange" id="d-save">Add</button>
      </div>
    </div>
  `;
  root.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  overlay.querySelector('#d-cancel').addEventListener('click', () => overlay.remove());

  const fileInput = overlay.querySelector('#d-file');
  const titleInput = overlay.querySelector('#d-title');
  const typeSelect = overlay.querySelector('#d-type');
  const urlInput = overlay.querySelector('#d-url');

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    if (!titleInput.value.trim()) {
      titleInput.value = file.name.replace(/\.[^.]+$/, '');
    }
    typeSelect.value = guessDocType(file.name);
    urlInput.value = '';
    urlInput.disabled = true;
    urlInput.placeholder = 'Cleared — a file is selected above';
  });

  const saveBtn = overlay.querySelector('#d-save');
  saveBtn.addEventListener('click', async () => {
    const file = fileInput.files[0];
    let url = urlInput.value.trim();
    let title = titleInput.value.trim();
    const doc_type = typeSelect.value;
    let storagePath = null;

    if (!file && !url) {
      alert('Choose a file to upload, or paste a link.');
      return;
    }
    if (!title && file) title = file.name.replace(/\.[^.]+$/, '');
    if (!title) { titleInput.focus(); return; }

    saveBtn.disabled = true;
    saveBtn.textContent = file ? 'Uploading…' : 'Adding…';

    if (file) {
      try {
        const safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_');
        storagePath = `${Date.now()}-${safeName}`;
        const { error: uploadError } = await supabase.storage
          .from(DOCS_BUCKET)
          .upload(storagePath, file);
        if (uploadError) throw uploadError;
        const { data: pub } = supabase.storage.from(DOCS_BUCKET).getPublicUrl(storagePath);
        url = pub.publicUrl;
      } catch (e) {
        alert("Couldn't upload the file — check your connection and try again.");
        console.error(e);
        saveBtn.disabled = false;
        saveBtn.textContent = 'Add';
        return;
      }
    }

    const doc = {
      id: 'd' + Math.random().toString(36).slice(2, 10),
      title, url, doc_type,
      added_by: getUserName() || 'Anonymous',
      storage_path: storagePath,
    };
    const ok = await insertDocument(doc);
    overlay.remove();
    if (ok) {
      await loadDocuments();
      render();
    }
  });
}

function openEditModal(existing) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>${existing ? 'Edit task' : 'New task'}</h3>
      <div class="field">
        <label>Title</label>
        <input id="m-title" type="text" value="${existing ? escapeHtml(existing.title) : ''}">
      </div>
      <div class="field">
        <label>Stage</label>
        <select id="m-stage">
          ${STAGES.map(s => `<option value="${escapeHtml(s)}" ${existing && existing.stage === s ? 'selected' : ''}>${escapeHtml(s)}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="m-desc">${existing ? escapeHtml(existing.description) : ''}</textarea>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="m-status">
          ${STATUSES.map(s => `<option value="${s}" ${existing && existing.status === s ? 'selected' : ''}>${STATUS_LABEL[s]}</option>`).join('')}
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="m-cancel">Cancel</button>
        <button class="btn btn-orange" id="m-save">Save</button>
      </div>
    </div>
  `;
  root.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  overlay.querySelector('#m-cancel').addEventListener('click', () => overlay.remove());
  overlay.querySelector('#m-save').addEventListener('click', async () => {
    const title = overlay.querySelector('#m-title').value.trim();
    if (!title) { overlay.querySelector('#m-title').focus(); return; }
    const stage = overlay.querySelector('#m-stage').value;
    const description = overlay.querySelector('#m-desc').value.trim();
    const status = overlay.querySelector('#m-status').value;
    const progress = status === 'complete' ? 100 : status === 'pending' ? 0 : (existing ? existing.progress : 0);

    let ok;
    if (existing) {
      ok = await updateTask(existing.id, { title, stage, description, status, progress });
    } else {
      ok = await insertTask(mk(title, stage, status, progress, description, []));
    }
    overlay.remove();
    if (ok) load();
  });
}

load();
subscribeToChanges();
subscribeToDocumentChanges();
if (!getUserName()) {
  promptForName();
}
</script>
